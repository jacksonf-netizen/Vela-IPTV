name: Vela
options:
  bundleIdPrefix: com.vela
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.vela.app

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4

targets:
  Vela:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Vela
        excludes:
          - "**/*.md"
    dependencies:
      - package: Sparkle
    info:
      path: Vela/Info.plist
      properties:
        CFBundleName: Vela IPTV
        CFBundleDisplayName: Vela IPTV
        CFBundleIdentifier: com.vela.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundleIconFile: AppIcon
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        SUFeedURL: "https://your-github-username.github.io/Vela/appcast.xml"
        SUPublicEDKey: "PLACEHOLDER_PUBLIC_KEY"
    entitlements:
      path: Vela/Vela.entitlements
      properties:
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: Vela IPTV
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
