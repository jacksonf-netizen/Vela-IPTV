name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          brew update
          brew install xcodegen

      - name: Sync App Version with GitHub Tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Strip "refs/tags/v" from the GitHub ref to get just the numbers (e.g., "1.0.4")
          RAW_TAG=${GITHUB_REF#refs/tags/}
          VERSION=${RAW_TAG#v}
          echo "Detected GitHub Tag Version: $VERSION"
          
          # Inject the version into project.yml
          sed -i '' "s/CFBundleShortVersionString: \".*\"/CFBundleShortVersionString: \"$VERSION\"/" project.yml
          sed -i '' "s/CFBundleVersion: \".*\"/CFBundleVersion: \"$GITHUB_RUN_NUMBER\"/" project.yml

      - name: Generate Project
        run: |
          xcodegen generate
          export LANG=en_US.UTF-8
          pod install

      - name: Build Application
        run: |
          mkdir -p build
          xcodebuild build \
            -workspace "Vela IPTV.xcworkspace" \
            -scheme "Vela" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES
          
          echo "Deep signing the application bundle to fix embedded framework crashes..."
          codesign --force --deep --sign - "build/Vela IPTV.app"

      - name: Create DMG
        run: |
          chmod +x scripts/create_dmg.sh
          ./scripts/create_dmg.sh

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # 1. Sparkle's tool expects the DMG to be in a flat folder
          mkdir -p sparkle_deployment
          cp build/VelaIPTV.dmg sparkle_deployment/
          
          # 2. Generate the XML map (appcast) by piping the secret directly
          echo -n "$SPARKLE_PRIVATE_KEY" | ./Pods/Sparkle/bin/generate_appcast sparkle_deployment --ed-key-file -
          
          # 3. Move files to /docs for GitHub Pages hosting
          mkdir -p docs
          cp sparkle_deployment/appcast.xml docs/
          cp build/VelaIPTV.dmg docs/
          
      - name: Deploy Update Map to GitHub Pages
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add docs/appcast.xml docs/VelaIPTV.dmg
          git commit -m "Automated update: Publish appcast and DMG for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/VelaIPTV.dmg
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
